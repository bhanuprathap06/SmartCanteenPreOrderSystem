<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Smart Canteen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-dot"></div>
    Admin Dashboard
  </div>
  <a href="/" style="font-size:0.85rem;color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text2)'">
    ← Menu
  </a>
</header>

<!-- TOAST -->
<div id="toast-container"></div>

<div class="admin-wrap">

  <!-- STAT CARDS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-label">Total Orders</div>
      <div class="stat-card-val" id="totalOrders">—</div>
      <div class="stat-card-sub">all time</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Total Revenue</div>
      <div class="stat-card-val" id="totalRev">—</div>
      <div class="stat-card-sub">all time</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Avg Order Value</div>
      <div class="stat-card-val" id="avgOrder">—</div>
      <div class="stat-card-sub">per customer</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Most Popular</div>
      <div class="stat-card-val" id="popular" style="font-size:1.2rem">—</div>
      <div class="stat-card-sub">top item</div>
    </div>
  </div>

  <!-- ORDERS TABLE -->
  <div class="section-title">All Orders</div>
  <table class="orders-table">
    <thead>
      <tr>
        <th>Token</th>
        <th>Customer</th>
        <th>Items</th>
        <th>Total</th>
        <th>Time</th>
        <th>Payment</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="ordersTableBody">
      <tr>
        <td colspan="7" style="text-align:center;color:var(--text2);padding:40px">
          <div class="spinner" style="display:inline-block"></div>
        </td>
      </tr>
    </tbody>
  </table>

</div>

<script src="admin.js"></script>
</body>
</html>
